<!DOCTYPE html>
<html>

<head>
    <title>Voter Login</title>
</head>

<body>

<h1>Voter Login</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

</body>

</html>
