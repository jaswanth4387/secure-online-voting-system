<!DOCTYPE html>
<html>

<head>
    <title>Voter Registration</title>
</head>

<body>

<h1>Voter Registration</h1>

<form method="POST">

    <input
        type="text"
        name="voter_id"
        placeholder="Voter ID"
        required
    >

    <br><br>

    <input
        type="email"
        name="email"
        placeholder="Email"
        required
    >

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required
    >

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

</body>

</html>
