<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block title %}{% endblock %}
    <link rel="icon" href="{{url_for('static', filename='images/favicon.ico')}}" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="{{url_for('static', filename='images/favicon-32x32.png')}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{url_for('static', filename='images/favicon-16x16.png')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static',filename='css/global.css')}}">
    <link rel="stylesheet" href="{{url_for('static',filename='css/auth.css')}}">


</head>
<body>
    <div class="top-header">
        <div class="container d-flex justify-content-between align-items-center">

            <div class="header-left">
                <a href="{{url_for('public.home')}}" class="d-flex align-items-center">
                    <img src="{{url_for('static', filename='images/logo.png')}}" class="main-logo" alt="logo">
                </a>

                <div class="ms-2">
                    <h4 class="portal-title">JanVote Portal</h4>
                    <small class="portal-subtitle">Online Voting Awareness & Service</small>
                </div>
            </div>

        </div>
    </div>
    {% block content %}
    {% endblock %}
    
</body>
</html>
