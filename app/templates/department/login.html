<!DOCTYPE html>
<html>

<head>
    <title>Department Officer Login</title>
</head>

<body>

    <h2>Department Officer Login</h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>

</html>
