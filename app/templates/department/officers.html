{% extends "layouts/admin_base.html" %}

{% block admin_content %}

<div class="d-flex justify-content-between mb-4">

    <h1>
        Department Officers
    </h1>

    <a
        href="{{ url_for(
            'department.add_officer'
        ) }}"
        class="btn btn-primary"
    >
        Add Officer
    </a>

</div>

<table class="table table-bordered">

    <thead>

        <tr>

            <th>User ID</th>

            <th>Role</th>

            <th>Designation</th>

            <th>Status</th>

        </tr>

    </thead>

    <tbody>

        {% for officer in officers %}

        <tr>

            <td>
                {{ officer.user_id }}
            </td>

            <td>
                {{ officer.role }}
            </td>

            <td>
                {{ officer.designation }}
            </td>

            <td>
                {{ officer.status }}
            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

{% endblock %}
